<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafio IA - Lindos Horizontes</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #1e293b, #0f172a);
    }

    header h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    header p {
      color: #94a3b8;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .form-box {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 40px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #0f172a;
      color: #fff;
    }

    textarea {
      resize: none;
      height: 100px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-size: 0.9rem;
    }

    button {
      margin-top: 20px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0ea5e9;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card-content h3 {
      margin: 0;
      font-size: 1rem;
    }

    .card-content p {
      font-size: 0.8rem;
      color: #94a3b8;
    }

    .highlight {
      margin-bottom: 40px;
    }

    .highlight img {
      width: 100%;
      border-radius: 12px;
    }

    .highlight-info {
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>Desafio IA - Sua Ideia, Nossa Arte</h1>
  <p>Envie sua ideia e ela pode virar uma arte em destaque!</p>
</header>

<div class="container">

  <div class="form-box">
    <h2>Envie sua ideia</h2>

    <label>Seu nome</label>
    <input type="text" placeholder="Ex: João Silva">

    <label>Sua ideia</label>
    <textarea placeholder="Ex: Um pôr do sol cyberpunk em Fortaleza"></textarea>

    <label>Instagram (opcional)</label>
    <input type="text" placeholder="@seuuser">

    <label>
      <input type="checkbox"> Aceito divulgar minhas redes caso minha ideia seja escolhida
    </label>

    <button>Enviar ideia</button>
  </div>

  <div class="highlight">
    <h2>🏆 Destaque da Semana</h2>
    <img src="https://via.placeholder.com/800x400" alt="Imagem destaque">
    <div class="highlight-info">
      <p>Ideia por: @usuario</p>
    </div>
  </div>

  <div>
    <h2>🔥 Outras ideias em destaque</h2>
    <div class="gallery">

      <div class="card">
        <img src="https://via.placeholder.com/300" alt="">
        <div class="card-content">
          <h3>Ideia criativa</h3>
          <p>@user</p>
        </div>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/300" alt="">
        <div class="card-content">
          <h3>Outra ideia</h3>
          <p>@user</p>
        </div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
